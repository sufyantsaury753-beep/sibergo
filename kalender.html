<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Arial, sans-serif; }
body { min-height: 100vh; background: #f4f4f4; display: flex; justify-content: center; }
.phone { width: 393px; min-height: 100vh; background: #f8f8f8; padding: 28px 24px; }
.header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.back { width: 42px; height: 42px; border-radius: 50%; border: none; background: #e7f6e9; color: #006b43; font-size: 24px; font-weight: 800; cursor: pointer; }
h1 { font-size: 24px; color: #111; line-height: 32px; }
.card { background: #fff; border-radius: 22px; padding: 24px; box-shadow: 0 8px 22px rgba(0,0,0,.06); }
p { color: #50505a; font-size: 16px; line-height: 25px; margin-bottom: 18px; }
.btn { display: inline-block; padding: 12px 18px; border-radius: 20px; background: #006b43; color: #fff; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<main class="phone">
  <div class="header">
    <button class="back" onclick="history.back()">‹</button>
    <h1>Kalender</h1>
  </div>
  <section class="card">
    <p>Halaman ini berhasil dibuka dari menu Beranda. Silakan isi konten halaman sesuai kebutuhan aplikasi.</p>
    <a class="btn" href="index.html">Kembali ke Beranda</a>
  </section>
</main>
</body>
</html>
